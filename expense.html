<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200, initial-scale=0.3, shrink-to-fit=no"> 
    <title>Smart Financial Tracker Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { background-color: #f0f2f5; padding: 20px; font-family: 'Segoe UI', sans-serif; min-width: 1200px; }
        .main-wrapper { width: 1100px; margin: 0 auto; }
        .summary-card { border-radius: 15px; color: white; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .summary-card:hover { transform: translateY(-5px); }
        .bg-income { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .bg-expense { background: linear-gradient(45deg, #e74c3c, #c0392b); }
        .bg-profit { background: linear-gradient(45deg, #3498db, #2980b9); }
        .bg-balance { background: linear-gradient(45deg, #9b59b6, #8e44ad); }
        
        .fab-add {
            position: fixed; right: 50px; bottom: 50px; width: 70px; height: 70px;
            border-radius: 50%; background: #0d6efd; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer; z-index: 1000; border: none;
        }

        .chart-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .detail-box { background: #fff3cd; border-left: 6px solid #ffc107; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .income-logic-area { background: #f8fff9; border: 2px dashed #28a745; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        #pdfReport { display: none; }
    </style>
</head>
<body>

<button class="fab-add" onclick="openModal()"><i class="bi bi-plus-lg"></i></button>

<div class="main-wrapper">
    <h2 class="text-center mb-4 fw-bold"><i class="bi bi-bank"></i> Smart Financial Tracker</h2>

    <div class="row text-center mb-4">
        <div class="col-3"><div class="summary-card bg-income"><h6>Total Income</h6><h2 id="totalIncVal">0</h2></div></div>
        <div class="col-3"><div class="summary-card bg-expense"><h6>Total Expense</h6><h2 id="totalExpVal">0</h2></div></div>
        <div class="col-3"><div class="summary-card bg-profit"><h6>Daily Profit</h6><h2 id="dailyVal">0</h2></div></div>
        <div class="col-3"><div class="summary-card bg-balance"><h6>Current Balance</h6><h2 id="balanceVal">0</h2></div></div>
    </div>

    <div class="chart-container">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div class="btn-group shadow-sm">
                <button class="btn btn-primary active" id="btnAll" onclick="updateView('All')">All Tracking</button>
                <button class="btn btn-outline-primary" id="btnInc" onclick="updateView('Income')">Income Only</button>
                <button class="btn btn-outline-primary" id="btnExp" onclick="updateView('Expense')">Expense Only</button>
            </div>
            <div class="d-flex gap-2">
                <input type="date" id="filterDate" class="form-control" style="width:180px;">
                <button class="btn btn-dark" onclick="applyFilter()"><i class="bi bi-search"></i> Load Data</button>
                <button class="btn btn-light border" onclick="resetFilter()">View All</button>
                <button class="btn btn-danger" onclick="downloadPDF()"><i class="bi bi-file-pdf"></i> Export PDF</button>
            </div>
        </div>

        <div style="height: 350px; width: 100%;"><canvas id="mainChart"></canvas></div>

        <div id="summarySection" class="detail-box">
            <h5 class="fw-bold text-primary border-bottom pb-2" id="sumHeader">Financial Summary</h5>
            <div id="detailList" class="mt-2">Loading data...</div>
        </div>

        <div class="table-responsive mt-4">
            <table class="table table-hover align-middle shadow-sm bg-white rounded">
                <thead class="table-dark">
                    <tr><th>Date</th><th>Type</th><th>Amount</th><th>Details/Remarks</th><th>Action</th></tr>
                </thead>
                <tbody id="dataTable"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="entryModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title fw-bold">Nayi Entry Karein</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="entryForm">
                    <div class="mb-3">
                        <label class="fw-bold">Type</label>
                        <select id="entryType" class="form-select" onchange="toggleForm()" required>
                            <option value="Income">Income</option>
                            <option value="Expense">Expense</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold">Date</label>
                        <input type="date" id="entryDate" class="form-control" required>
                    </div>

                    <div id="incomeLogic" class="income-logic-area">
                        <div class="mb-2">
                            <label class="small fw-bold text-muted">Opening Balance (Readable)</label>
                            <input type="number" id="openBal" class="form-control bg-light" readonly>
                        </div>
                        <div class="mb-2">
                            <label class="fw-bold">Today Balance (Enter Here)</label>
                            <input type="number" id="todayBal" class="form-control" oninput="calcIncome()" placeholder="Enter current amount">
                        </div>
                        <div class="mb-0">
                            <label class="small fw-bold text-success">Total Income (Today Profit)</label>
                            <input type="number" id="calcInc" class="form-control bg-light fw-bold" readonly>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="fw-bold" id="amtLabel">Amount</label>
                        <input type="number" id="entryAmount" class="form-control" step="0.01">
                    </div>
                    <div class="mb-3">
                        <label class="fw-bold" id="remLabel">Remarks</label>
                        <textarea id="entryRemarks" class="form-control" rows="2" placeholder="Detail yahan likhein..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Save Record</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div id="pdfReport" style="padding: 30px;">
    <h2 style="text-align: center;">Financial Report</h2>
    <hr>
    <div id="pdfContent"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      databaseURL: "https://own-live-steam-web-default-rtdb.firebaseio.com/",
      projectId: "own-live-steam-web"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'transactions');

    let allData = [];
    let currentTab = 'All';
    let filterDate = null;
    let myChart = null;
    const modalObj = new bootstrap.Modal(document.getElementById('entryModal'));

    const getToday = () => new Date().toISOString().split('T')[0];

    // Page Init
    document.getElementById('filterDate').value = getToday();

    onValue(dbRef, (snap) => {
        allData = [];
        snap.forEach(c => { allData.push({ id: c.key, ...c.val() }); });
        refreshUI();
    });

    window.refreshUI = function() {
        const tbody = document.getElementById('dataTable');
        const list = document.getElementById('detailList');
        tbody.innerHTML = '';
        
        // Filtering Logic
        let filtered = allData.filter(t => {
            const matchesType = (currentTab === 'All' || t.type === currentTab);
            const matchesDate = (!filterDate || t.date === filterDate);
            return matchesType && matchesDate;
        }).sort((a,b) => new Date(b.date) - new Date(a.date));

        let tInc = 0, tExp = 0, summaryHTML = "", chartLabels = [], chartInc = [], chartExp = [];

        filtered.forEach(t => {
            const isInc = t.type === 'Income';
            isInc ? tInc += t.amount : tExp += t.amount;
            
            tbody.innerHTML += `<tr>
                <td>${t.date}</td>
                <td><span class="badge ${isInc?'bg-success':'bg-danger'}">${t.type}</span></td>
                <td class="fw-bold">${t.amount.toFixed(2)}</td>
                <td>${t.remarks}</td>
                <td><button class="btn btn-sm btn-outline-danger" onclick="deleteEntry('${t.id}')"><i class="bi bi-trash"></i></button></td>
            </tr>`;
            
            summaryHTML += `• <b>${t.date}</b>: ${t.type} of $${t.amount.toFixed(2)} (${t.remarks})<br>`;
            
            if(!chartLabels.includes(t.date)) chartLabels.push(t.date);
        });

        document.getElementById('sumHeader').innerText = `Records: ${filtered.length} | Income: $${tInc.toFixed(2)} | Expense: $${tExp.toFixed(2)}`;
        document.getElementById('detailList').innerHTML = summaryHTML || "No transactions found.";
        
        updateSummaryCards();
        initChart(filtered);
    }

    function updateSummaryCards() {
        let totalIncome = 0, totalExpense = 0, dailyProfit = 0;
        const today = getToday();
        
        allData.forEach(t => {
            if(t.type === 'Income') totalIncome += t.amount;
            else totalExpense += t.amount;
            if(t.date === today) dailyProfit += (t.type === 'Income' ? t.amount : -t.amount);
        });

        document.getElementById('totalIncVal').innerText = totalIncome.toFixed(2);
        document.getElementById('totalExpVal').innerText = totalExpense.toFixed(2);
        document.getElementById('dailyVal').innerText = dailyProfit.toFixed(2);
        document.getElementById('balanceVal').innerText = (totalIncome - totalExpense).toFixed(2);
    }

    window.initChart = (data) => {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if(myChart) myChart.destroy();
        
        const sorted = [...data].sort((a,b) => new Date(a.date) - new Date(b.date));
        const labels = [...new Set(sorted.map(d => d.date))];
        const incs = labels.map(l => sorted.filter(d => d.date === l && d.type === 'Income').reduce((s,c) => s+c.amount,0));
        const exps = labels.map(l => sorted.filter(d => d.date === l && d.type === 'Expense').reduce((s,c) => s+c.amount,0));

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { label: 'Income', data: incs, backgroundColor: '#2ecc71' },
                    { label: 'Expense', data: exps, backgroundColor: '#e74c3c' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    window.updateView = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active', 'btn-primary'));
        document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.add('btn-outline-primary'));
        const activeBtn = tab === 'All' ? 'btnAll' : (tab === 'Income' ? 'btnInc' : 'btnExp');
        document.getElementById(activeBtn).classList.replace('btn-outline-primary', 'btn-primary');
        refreshUI();
    };

    window.applyFilter = () => { filterDate = document.getElementById('filterDate').value; refreshUI(); };
    window.resetFilter = () => { filterDate = null; refreshUI(); };
    window.deleteEntry = (id) => { if(confirm("Are you sure?")) remove(ref(db, 'transactions/'+id)); };

    // Modal Logic
    window.openModal = () => {
        document.getElementById('entryForm').reset();
        document.getElementById('entryDate').value = getToday();
        toggleForm();
        modalObj.show();
    };

    window.toggleForm = () => {
        const type = document.getElementById('entryType').value;
        const incArea = document.getElementById('incomeLogic');
        const amtLabel = document.getElementById('amtLabel');
        const remLabel = document.getElementById('remLabel');
        
        if(type === 'Income') {
            incArea.style.display = 'block';
            document.getElementById('amtLabel').parentElement.style.display = 'none';
            remLabel.innerText = "Remarks";
            const bal = parseFloat(document.getElementById('balanceVal').innerText) || 0;
            document.getElementById('openBal').value = bal.toFixed(2);
        } else {
            incArea.style.display = 'none';
            document.getElementById('amtLabel').parentElement.style.display = 'block';
            amtLabel.innerText = "Amount Expended";
            remLabel.innerText = "Expense Detail";
        }
    };

    window.calcIncome = () => {
        const ob = parseFloat(document.getElementById('openBal').value) || 0;
        const tb = parseFloat(document.getElementById('todayBal').value) || 0;
        const diff = tb - ob;
        document.getElementById('calcInc').value = diff.toFixed(2);
        document.getElementById('entryAmount').value = diff;
    };

    document.getElementById('entryForm').onsubmit = (e) => {
        e.preventDefault();
        const data = {
            type: document.getElementById('entryType').value,
            date: document.getElementById('entryDate').value,
            amount: parseFloat(document.getElementById('entryAmount').value),
            remarks: document.getElementById('entryRemarks').value || "N/A"
        };
        push(dbRef, data);
        modalObj.hide();
    };

    window.downloadPDF = () => {
        const content = document.getElementById('summarySection').innerHTML;
        const pdfArea = document.getElementById('pdfContent');
        pdfArea.innerHTML = content;
        const element = document.getElementById('pdfReport');
        element.style.display = 'block';
        html2pdf().from(element).save('Finance_Summary.pdf').then(() => { element.style.display = 'none'; });
    };

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
