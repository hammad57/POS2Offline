<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hammad's Card Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .modal { display: none; transition: opacity 0.3s ease; }
        .modal.active { display: flex; z-index: 100; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-shadow:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">

    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-40 h-16 flex items-center px-6 justify-between">
        <div class="flex items-center space-x-3">
            <i class="fa-solid fa-shield-halved text-2xl"></i>
            <h1 class="text-xl font-bold tracking-tight">Card Vault</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="userEmail" class="text-xs font-light hidden sm:block"></span>
            <button id="authBtn" class="bg-white text-indigo-600 px-4 py-1.5 rounded-full text-sm font-bold shadow-sm hover:bg-indigo-50 transition">Login</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 mb-20">
        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div id="loadingText" class="col-span-full text-center py-20">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-indigo-500 mb-4"></i>
                <p class="text-slate-500 font-medium">Data sync ho raha hai...</p>
            </div>
        </div>
    </main>

    <button id="addCardBtn" class="fixed bottom-8 right-8 bg-indigo-600 text-white w-16 h-16 rounded-full shadow-2xl hover:bg-indigo-700 active:scale-90 transition-all flex items-center justify-center z-50 text-2xl">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div id="addModal" class="modal fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl max-h-[90vh] overflow-hidden flex flex-col">
            <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-slate-800">Naya Card Add Karein</h2>
                <button id="closeAddModal" class="text-slate-400 hover:text-red-500 text-3xl">&times;</button>
            </div>
            
            <form id="cardForm" class="p-6 space-y-4 overflow-y-auto">
                <select id="cardType" class="w-full border-2 border-slate-100 rounded-xl p-3 focus:border-indigo-500 outline-none transition">
                    <option value="payment">Payment Card (Bank)</option>
                    <option value="visiting">Visiting Card</option>
                    <option value="cnic">CNIC Card</option>
                    <option value="other">Other Card</option>
                </select>

                <div id="dynamicFields" class="grid grid-cols-1 gap-4">
                    </div>

                <div class="grid grid-cols-2 gap-4 pt-2">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Front Image</label>
                        <input type="file" id="frontPic" class="text-xs w-full">
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase">Back Image</label>
                        <input type="file" id="backPic" class="text-xs w-full">
                    </div>
                </div>

                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition-all mt-4">SAVE TO VAULT</button>
            </form>
        </div>
    </div>

    <div id="viewModal" class="modal fixed inset-0 bg-slate-900/80 backdrop-blur-md items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md overflow-hidden relative shadow-2xl">
            <button id="closeViewModal" class="absolute top-3 right-4 text-3xl text-slate-400 z-10 hover:text-red-500">&times;</button>
            <div id="viewContent" class="p-0"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // Aap ki di hui configuration
        const firebaseConfig = {
            databaseURL: "https://own-live-steam-web-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let userSession = null;
        const ADMIN = "mysw786@gmail.com";

        // DOM Elements
        const container = document.getElementById('cardsContainer');
        const addBtn = document.getElementById('addCardBtn');
        const addModal = document.getElementById('addModal');
        const cardType = document.getElementById('cardType');
        const dynamicFields = document.getElementById('dynamicFields');
        const cardForm = document.getElementById('cardForm');

        // Toggle Modal
        addBtn.onclick = () => addModal.classList.add('active');
        document.getElementById('closeAddModal').onclick = () => addModal.classList.remove('active');
        document.getElementById('closeViewModal').onclick = () => document.getElementById('viewModal').classList.remove('active');

        // Login Logic
        onAuthStateChanged(auth, (user) => {
            userSession = user;
            const btn = document.getElementById('authBtn');
            const emailDisp = document.getElementById('userEmail');
            if(user) {
                btn.innerText = "Logout";
                emailDisp.innerText = user.email;
                emailDisp.classList.remove('hidden');
            } else {
                btn.innerText = "Login";
                emailDisp.classList.add('hidden');
            }
        });

        document.getElementById('authBtn').onclick = () => {
            if(userSession) signOut(auth);
            else signInWithPopup(auth, provider);
        };

        // Form Generator
        const updateFields = () => {
            const type = cardType.value;
            let html = `<input type="text" id="title" placeholder="Card Title (e.g. Hammad Mart Bank)" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500" required>`;
            
            if(type === 'payment') {
                html += `
                    <input type="text" id="acc_num" placeholder="Account Number" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                    <input type="text" id="holder" placeholder="Card Holder Name" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="expiry" placeholder="Expiry (MM/YY)" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                        <input type="password" id="cvv" placeholder="Security Code" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                    </div>
                `;
            } else if(type === 'cnic') {
                html += `
                    <input type="text" id="cnic_num" placeholder="CNIC Number" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                    <input type="text" id="dob" placeholder="Date of Birth" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                `;
            } else {
                html += `
                    <input type="text" id="name" placeholder="Full Name" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                    <input type="text" id="contact" placeholder="Contact Details" class="w-full border-2 border-slate-100 rounded-xl p-3 outline-none focus:border-indigo-500">
                `;
            }
            dynamicFields.innerHTML = html;
        };
        cardType.onchange = updateFields;
        updateFields();

        // Save Data
        cardForm.onsubmit = async (e) => {
            e.preventDefault();
            const data = { type: cardType.value, timestamp: Date.now() };
            const inputs = cardForm.querySelectorAll('input:not([type="file"]), select');
            inputs.forEach(i => data[i.id] = i.value);

            try {
                const newCardRef = push(ref(db, 'cards/'));
                await set(newCardRef, data);
                cardForm.reset();
                addModal.classList.remove('active');
                alert("Card Save Ho Gya!");
            } catch (err) { alert("Error: " + err.message); }
        };

        // Load Data
        onValue(ref(db, 'cards/'), (snapshot) => {
            document.getElementById('loadingText').style.display = 'none';
            container.innerHTML = '';
            const data = snapshot.val();
            if(!data) {
                container.innerHTML = '<p class="col-span-full text-center text-slate-400">Abhi tak koi card nahi hai.</p>';
                return;
            }

            Object.keys(data).forEach(id => {
                const item = data[id];
                const div = document.createElement('div');
                div.className = "bg-white p-5 rounded-2xl shadow-sm border border-slate-100 card-shadow cursor-pointer relative group";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold uppercase px-2 py-1 rounded-md">${item.type}</span>
                        <button onclick="window.deleteCard('${id}')" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                    <h3 class="font-bold text-slate-800 text-lg mb-1">${item.title}</h3>
                    <p class="text-slate-400 text-sm font-mono">${item.acc_num || item.cnic_num || 'Detais stored'}</p>
                `;
                div.onclick = (e) => {
                    if(!e.target.closest('button')) showDetails(item);
                };
                container.appendChild(div);
            });
        });

        // Global Delete
        window.deleteCard = (id) => {
            if(confirm("Kiya waqai delete karna hai?")) remove(ref(db, 'cards/' + id));
        };

        // Show Details
        const showDetails = (item) => {
            const isAuth = userSession && userSession.email === ADMIN;
            let content = `
                <div class="bg-indigo-600 p-6 text-white">
                    <h2 class="text-2xl font-bold">${item.title}</h2>
                    <p class="opacity-80 text-sm uppercase tracking-widest">${item.type}</p>
                </div>
                <div class="p-6 space-y-4">
            `;

            Object.entries(item).forEach(([key, val]) => {
                if(['type', 'title', 'timestamp', 'cvv'].includes(key)) return;
                content += `<div><label class="text-[10px] font-bold text-slate-400 uppercase">${key.replace('_',' ')}</label><p class="text-slate-700 font-medium">${val}</p></div>`;
            });

            if(item.type === 'payment') {
                content += `
                    <div class="bg-red-50 p-3 rounded-xl border border-red-100">
                        <label class="text-[10px] font-bold text-red-400 uppercase">Security Code (CVV)</label>
                        <p class="text-red-700 font-bold text-lg">${isAuth ? item.cvv : '•••• (Restricted)'}</p>
                    </div>
                `;
            }

            content += `</div>`;
            document.getElementById('viewContent').innerHTML = content;
            document.getElementById('viewModal').classList.add('active');
        };

    </script>
</body>
</html>
