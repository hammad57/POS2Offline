<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Card Scanner</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f4f9; }
        h2 { color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        video { width: 100%; max-width: 400px; border: 2px solid #ccc; border-radius: 5px; margin-bottom: 10px; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; font-size: 16px; width: 100%; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #aaa; cursor: not-allowed; }
        input[type="text"] { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .hidden { display: none; }
        .status { margin-top: 10px; font-weight: bold; color: green; }
        #reader { width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <h2>License Scanner & Saver</h2>
    
    <div id="camera-section">
        <video id="video" autoplay playsinline></video>
        <button id="btn-front" onclick="captureImage('front')">1. Capture Front Side</button>
        <button id="btn-back" class="hidden" onclick="captureImage('back')">2. Capture Back Side</button>
    </div>

    <div id="qr-section" class="hidden">
        <h3>Step 3: Enter or Scan License No.</h3>
        <div id="reader"></div>
        <input type="text" id="manual-input" placeholder="Enter License Number Manually">
        <button id="btn-save" onclick="processSave()">Save Images</button>
        <button style="background-color: #dc3545;" onclick="resetApp()">Reset / Start Over</button>
    </div>

    <div id="status-msg" class="status"></div>
</div>

<script>
    let frontImageBlob = null;
    let backImageBlob = null;
    let directoryHandle = null; // PC folder save handle
    let html5QrcodeScanner = null;
    let stream = null;

    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');

    // Start Normal Camera
    async function startCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
        } catch (err) {
            alert("Camera error: " + err.message);
        }
    }

    startCamera();

    // Capture Image (Front or Back)
    function captureImage(side) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        canvas.toBlob((blob) => {
            if (side === 'front') {
                frontImageBlob = blob;
                document.getElementById('btn-front').classList.add('hidden');
                document.getElementById('btn-back').classList.remove('hidden');
                document.getElementById('status-msg').innerText = "Front side captured!";
            } else {
                backImageBlob = blob;
                document.getElementById('camera-section').classList.add('hidden');
                document.getElementById('qr-section').classList.remove('hidden');
                document.getElementById('status-msg').innerText = "Back side captured! Now scan or enter number.";
                
                // Stop camera stream to free it for QR Scanner
                stream.getTracks().forEach(track => track.stop());
                startQRScanner();
            }
        }, 'image/jpeg');
    }

    // Start QR Scanner
    function startQRScanner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('manual-input').value = decodedText;
        document.getElementById('status-msg').innerText = "QR Scanned Successfully!";
        html5QrcodeScanner.clear(); // Stop scanning after success
    }

    function onScanFailure(error) {
        // Ignored, continuous scanning
    }

    // Process Saving based on Desktop vs Mobile
    async function processSave() {
        const licenseNo = document.getElementById('manual-input').value.trim();
        if (!licenseNo) {
            alert("Please enter or scan a license number first.");
            return;
        }

        const frontName = `${licenseNo} F.jpg`;
        const backName = `${licenseNo} B.jpg`;

        // Check if browser supports File System Access API (Mostly PC Chrome)
        if (window.showDirectoryPicker) {
            try {
                if (!directoryHandle) {
                    // Mange ga location pehli dafa
                    directoryHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
                }
                
                await saveToFileSystem(directoryHandle, frontImageBlob, frontName);
                await saveToFileSystem(directoryHandle, backImageBlob, backName);
                
                document.getElementById('status-msg').innerText = `Saved in selected folder: ${frontName} & ${backName}`;
            } catch (error) {
                console.log("File System API failed or user cancelled, falling back to normal download.", error);
                downloadFallback(frontImageBlob, frontName);
                downloadFallback(backImageBlob, backName);
            }
        } else {
            // Mobile ya old browsers k liye direct download (Downloads folder mein jaye ga)
            downloadFallback(frontImageBlob, frontName);
            downloadFallback(backImageBlob, backName);
            document.getElementById('status-msg').innerText = `Images downloaded to mobile Downloads folder.`;
        }

        setTimeout(resetApp, 3000);
    }

    // Save using PC File System API
    async function saveToFileSystem(dirHandle, blob, filename) {
        const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
        const writable = await fileHandle.createWritable();
        await writable.write(blob);
        await writable.close();
    }

    // Normal Download Function (Mobile Fallback)
    function downloadFallback(blob, filename) {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Reset sab kuch nayee capture k liye
    function resetApp() {
        if (html5QrcodeScanner) {
            try { html5QrcodeScanner.clear(); } catch(e){}
        }
        document.getElementById('camera-section').classList.remove('hidden');
        document.getElementById('qr-section').classList.add('hidden');
        document.getElementById('btn-front').classList.remove('hidden');
        document.getElementById('btn-back').classList.add('hidden');
        document.getElementById('manual-input').value = "";
        document.getElementById('status-msg').innerText = "";
        startCamera();
    }
</script>

</body>
</html>
